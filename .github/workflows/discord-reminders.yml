name: SKN_3rd_PJ Discord Reminders

on:
  schedule:
    # 11:00 KST, Monday-Friday.
    - cron: "0 2 * * 1-5"
    # 17:00 KST, Monday-Friday.
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      reminder:
        description: "Reminder to send"
        required: true
        default: focus
        type: choice
        options:
          - focus
          - progress

permissions:
  contents: read

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Select reminder message
        id: reminder
        env:
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL_REMINDER: ${{ github.event.inputs.reminder || '' }}
        run: |
          if [ "$SCHEDULE" = "0 2 * * 1-5" ] || [ "$MANUAL_REMINDER" = "focus" ]; then
            echo "message=오전 11시입니다. 에어팟을 끼고 각자 할 일에 집중해주세요. 대화는 DM으로 부탁드려요 🙏" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "0 8 * * 1-5" ] || [ "$MANUAL_REMINDER" = "progress" ]; then
            echo "message=오후 5시입니다. 오늘 각자 진행상황을 팀 Notion에 업로드해주세요." >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported reminder schedule: $SCHEDULE"
            exit 1
          fi

      - name: Send Discord message
        env:
          MESSAGE: ${{ steps.reminder.outputs.message }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL GitHub secret is not configured."
            exit 1
          fi

          payload=$(jq -nc \
            --arg content "$MESSAGE" \
            --arg username "Notion 알림봇" \
            '{content: $content, username: $username}')

          curl --fail --silent --show-error \
            --header "Content-Type: application/json" \
            --header "User-Agent: SKN_3rd_PJ Reminder Bot (GitHub Actions)" \
            --data "$payload" \
            "$DISCORD_WEBHOOK_URL"
